# Pre-commit hooks — mirror scripts/check.sh so CI surprises are rare.
#
# Install once:   .venv/bin/pre-commit install
# Run manually:   .venv/bin/pre-commit run --all-files
#
# Hooks are ordered cheapest-first so a trailing-whitespace fix doesn't
# wait behind a 20-second semgrep run.

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: check-merge-conflict
      - id: mixed-line-ending
        args: [--fix=lf]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.5.5
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.10.1
    hooks:
      - id: mypy
        files: ^src/zakupator/
        additional_dependencies:
          - aiogram>=3.4
          - httpx>=0.27
          - pydantic>=2.6
          - pydantic-settings>=2.2
          - sqlalchemy[asyncio]>=2.0
          - aiosqlite>=0.20

  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.9
    hooks:
      - id: bandit
        args: [-c, pyproject.toml, -q]
        files: ^src/zakupator/
        additional_dependencies: ["bandit[toml]"]

  # semgrep and pip-audit are intentionally CI-only — they're too slow
  # (~20s and ~3s respectively on a clean venv) for pre-commit to be
  # tolerable. `scripts/check.sh all` is the full local gate.
